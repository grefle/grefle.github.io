<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grefle Portfolio | Digital Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Кастомний курсор -->
    <div id="cursor"></div>

    <nav>
        <div class="logo">GREFLE<span class="dot">.</span></div>
        <ul class="nav-links">
            <li><a href="#photos">Фото</a></li>
            <li><a href="#drawings">Малюнки</a></li>
        </ul>
        <button id="theme-toggle"><i class="fas fa-sun"></i></button>
    </nav>

    <header id="about">
        <div class="header-content reveal">
            <div class="time-greeting" id="greeting">Добрий день</div>
            <h1>Привіт, я <span class="highlight-yellow">Grefle</span></h1>
            <p>Творець візуальних історій. Кожне фото та лінія — це <span class="highlight-green">окрема емоція</span>, зафіксована в цифрі.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="mailto:grefle.art@gmail.com"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </header>

    <section id="photos" class="gallery-section">
        <h2 class="reveal">Естетика кадру</h2>
        <div class="grid" id="photos-grid"></div>
    </section>

    <section id="drawings" class="gallery-section">
        <h2 class="reveal">Цифрові полотна</h2>
        <div class="grid" id="drawings-grid"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
