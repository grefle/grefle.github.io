<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grefle Portfolio | Visual Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">GREFLE<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#about">Про мене</a></li>
            <li><a href="#photos">Фотографії</a></li>
            <li><a href="#drawings">Малюнки</a></li>
        </ul>
        <button id="theme-toggle" title="Змінити тему">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <header id="about">
        <div class="header-content reveal">
            <div class="badge">Visual Artist</div>
            <h1>Привіт, я <span class="gradient-text">Grefle</span></h1>
            <p>Досліджую світ крізь об'єктив та цифрові полотна в пошуках ідеального світла.</p>
            <div class="socials">
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-behance"></i></a>
                <a href="mailto:grefle.art@gmail.com" class="social-link"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </header>

    <section id="photos" class="gallery-section">
        <div class="section-header reveal">
            <h2>Фотографії</h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="photos-grid">
            <!-- Сюди скрипт додасть фото -->
        </div>
    </section>

    <section id="drawings" class="gallery-section">
        <div class="section-header reveal">
            <h2>Малюнки</h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="drawings-grid">
            <!-- Сюди скрипт додасть малюнки -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Grefle. Створено з акцентом на візуальну чистоту.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
