<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grefle Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">GREFLE</div>
        <ul class="nav-links">
            <li><a href="#about">Про мене</a></li>
            <li><a href="#photos">Фотографії</a></li>
            <li><a href="#drawings">Малюнки</a></li>
        </ul>
        <button id="theme-toggle" title="Змінити тему">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <header id="about">
        <div class="header-content reveal">
            <h1>Привіт, я Grefle</h1>
            <p>Візуальний митець та фотограф. Досліджую світ через цифрову графіку та об'єктив камери.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-behance"></i></a>
                <a href="mailto:grefle.art@gmail.com"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </header>

    <section id="photos" class="gallery-section">
        <h2 class="reveal">Фотографії</h2>
        <div class="grid" id="photos-grid">
            <!-- Зображення з тегом 'photos' -->
        </div>
    </section>

    <section id="drawings" class="gallery-section">
        <h2 class="reveal">Малюнки</h2>
        <div class="grid" id="drawings-grid">
            <!-- Зображення з тегом 'artworks' -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Grefle. Хостинг на GitHub, Медіа на Cloudinary.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
