<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grefle Portfolio | Visual Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Анімований фон -->
    <div class="bg-visuals">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">GREFLE<span>.</span></div>
        <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="#about" data-i18n="nav_about">Про мене</a></li>
            <li><a href="#photos" data-i18n="nav_photos">Фотографії</a></li>
            <li><a href="#drawings" data-i18n="nav_drawings">Малюнки</a></li>
        </ul>
        <div class="nav-controls">
            <button id="lang-toggle" class="lang-btn">EN</button>
            <button id="theme-toggle" title="Змінити тему"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <header id="about">
        <div class="header-content">
            <div class="badge" data-i18n="badge">Visual Artist</div>
            <h1><span data-i18n="hero_greet">Привіт, я</span> <span class="gradient-text">Grefle</span></h1>
            <p data-i18n="hero_desc">Досліджую світ крізь об'єктив та цифрові полотна в пошуках сенсу</p>
            <div class="socials">
                <a href="https://www.instagram.com/grefle" class="social-link" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="mailto:timesetday61@gmail.com" class="social-link"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </header>

    <section id="photos" class="gallery-section">
        <div class="section-header">
            <h2 data-i18n="nav_photos">Фотографії</h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="photos-grid"></div>
    </section>

    <section id="drawings" class="gallery-section">
        <div class="section-header">
            <h2 data-i18n="nav_drawings">Малюнки</h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="drawings-grid"></div>
    </section>

    <footer>
        <p data-i18n="footer">&copy; 2026 Grefle. Створено з акцентом на візуальну чистоту.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
